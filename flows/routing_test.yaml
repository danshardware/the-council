id: routing_test
max_iterations: 8
start: think

blocks:

  think:
    type: llm
    model_id: us.amazon.nova-lite-v1:0
    system_prompt: |
      You are a test agent. You have been given a task.
      Decide what to do: either investigate further or conclude.

      Respond ONLY with valid YAML:
      ```yaml
      reasoning: "brief reason"
      action: investigate  # investigate | conclude
      action_input:
        detail: "what you want to investigate or your conclusion"
      ```
    transitions:
      investigate: pre_guard
      conclude: END
      default: think

  pre_guard:
    type: guardrail
    model_id: us.amazon.nova-lite-v1:0
    system_prompt: "{{{config.guardrails.action_safety}}}"
    transitions:
      approved: investigate
      needs_confirmation: human_check
      rejected: think

  investigate:
    type: llm
    model_id: us.amazon.nova-lite-v1:0
    system_prompt: |
      You are investigating a topic. Summarise what you found and decide if you need
      to investigate more or are ready to conclude.

      Respond ONLY with valid YAML:
      ```yaml
      reasoning: "what you found"
      action: more  # more | conclude
      action_input:
        finding: "key finding"
      ```
    transitions:
      more: think
      conclude: END
      default: think

  human_check:
    type: human_input
    prompt: "Guardrail flagged this action. Approve? [y/n]: "
    transitions:
      approved: investigate
      rejected: think
