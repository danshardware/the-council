id: web_search
max_iterations: 5
start: research

on_error:
  max_iterations:
    start: synthesise

blocks:

  # ── Phase 1: multi-query search + scrape (all in Python, no LLM loops) ──────────

  research:
    type: llm
    system_prompt: |
      You are a research assistant. Call research_web once with:
        - queries: a list of 4–5 targeted search query strings covering the question
        - focus:   a short phrase describing what to look for in each page
        - max_pages: 6 (default)

      research_web runs the full pipeline in Python — searching, URL selection,
      scraping, and saving results to research_results.md in your workspace.
      It returns a compact per-source summary (not the full file).

      After research_web completes, respond ONLY with:
      ```yaml
      action: synthesise
      ```

      Only call research_web a second time if the results are clearly missing a
      critical aspect of the question.
    tools:
      - research_web
    transitions:
      default: research
      synthesise: synthesise

  # ── Phase 2: synthesise findings into a final answer ──────────────────────────

  synthesise:
    type: llm
    system_prompt: |
      The research results are saved in research_results.md in your workspace.
      Your workspace path is shown below under "You can access files in:".

      1. Call read_file with the full path: prepend your workspace path to
         research_results.md (e.g. workspace/web_search/abc123/research_results.md).
      2. Synthesise a comprehensive, well-structured answer to the original question.
         Use only information from the file. Note limitations if content is sparse.

      Respond ONLY with valid YAML:
      ```yaml
      reasoning: "your comprehensive answer here"
      action: done
      ```
    tools:
      - read_file
    transitions:
      default: synthesise

